<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการสายพันธุ์ — Sunfarm</title>
<script src="breeds.js"></script>
<style>
  :root{
    --bg:#f4f5f6; --panel:#ffffff; --ink:#2a3136; --muted:#7e858b; --line:#e4e7ea;
    --primary:#2d8b8b; --primary-d:#236f6f; --accent:#f26b4e; --head:#1a2332; --good:#3bb38a; --bad:#e15a5a;
    --shadow:0 2px 6px rgba(28,33,40,.10),0 12px 30px rgba(28,33,40,.14);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%;
    font-family:"Sukhumvit Set","Noto Sans Thai",-apple-system,"Segoe UI",sans-serif;line-height:1.5;font-size:15px}
  header{padding:13px 18px;background:var(--head);color:#fff;position:sticky;top:0;z-index:20;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:12px}
  header h1{margin:0;font-size:16px;font-weight:800;flex:1}
  header a{color:#bfe3e3;font-size:13px;text-decoration:none;white-space:nowrap}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 100px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
  .card h2{margin:0 0 4px;font-size:16px;color:var(--head)}
  .desc{color:var(--muted);font-size:13px;margin-bottom:12px}
  label{display:block;font-weight:600;font-size:14px;margin:12px 0 5px}
  label .req{color:var(--accent)} label small{font-weight:400;color:var(--muted)}
  input[type=text]{width:100%;padding:13px;border:1px solid var(--line);border-radius:11px;font-size:16px;font-family:inherit;min-height:50px}
  input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,139,139,.15)}
  .row2{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
  input[type=color]{width:64px;height:50px;border:1px solid var(--line);border-radius:11px;padding:3px;background:#fff;cursor:pointer}
  .emojis{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
  .emojis button{font-size:20px;width:46px;height:46px;border:1px solid var(--line);border-radius:11px;background:#fff;cursor:pointer}
  .emojis button.on{border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,139,139,.18)}
  .btn{width:100%;padding:15px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:16px}
  .btn:hover{background:var(--primary-d)} .btn:disabled{opacity:.55}
  .btn.ghost{background:#fff;color:var(--muted);border:1px solid var(--line);margin-top:8px}
  .blist{display:flex;flex-direction:column;gap:9px}
  .brow{display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
  .sw{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px}
  .binfo{flex:1;min-width:0}
  .bn{font-weight:800;font-size:15px;color:var(--head)}
  .bk{font-size:12px;color:var(--muted)}
  .bact{display:flex;gap:6px;flex:none}
  .bact button{border:1px solid var(--line);background:#fff;border-radius:9px;width:38px;height:38px;cursor:pointer;font-size:15px}
  .bact button.del:hover{border-color:var(--bad)}
  .note{background:#fff8ee;border:1px solid #f3d9b6;color:#8a5a1a;border-radius:10px;padding:9px 12px;font-size:12.5px;margin-bottom:12px}
  .hint{background:#eef6f6;border:1px solid #cfe6e6;border-radius:10px;padding:9px 12px;font-size:12.5px;color:var(--primary-d);margin:6px 0}
  #boot{text-align:center;padding:50px 20px;color:var(--muted)}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(140px);z-index:100;background:var(--head);color:#fff;
    padding:12px 20px;border-radius:30px;font-weight:700;font-size:14px;box-shadow:0 6px 24px rgba(0,0,0,.25);max-width:90vw;text-align:center;transition:.3s}
  #toast.show{transform:translateX(-50%) translateY(0)} #toast.ok{background:var(--good)} #toast.err{background:var(--bad)}
</style>
</head>
<body>
<header>
  <h1>🎨 จัดการสายพันธุ์ไก่</h1>
  <a href="index.html">← หน้าหลัก</a>
</header>

<div class="wrap">
  <div id="boot">⏳ กำลังโหลด…</div>
  <div id="app" style="display:none">

    <div class="card">
      <h2 id="formTitle">➕ เพิ่มสายพันธุ์</h2>
      <div class="desc">กรอกชื่อ + รหัสนำหน้า + เลือกสี แล้วกดบันทึก · มีผลทุกหน้าทันที</div>
      <label>ชื่อสายพันธุ์ <span class="req">*</span></label>
      <input type="text" id="bName" placeholder="เช่น โร้ดไอแลนด์เรด">
      <label>รหัสนำหน้า <span class="req">*</span> <small>— ตัวอักษรขึ้นต้นรหัสไก่พันธุ์นี้ (คั่นหลายคำด้วย ,)</small></label>
      <input type="text" id="bKw" placeholder="เช่น RIR หรือ RIR,โร้ด">
      <div class="hint">ระบบจะระบายสีให้ทุกไก่ที่รหัส/ชื่อ "มีคำนี้อยู่" — เช่นใส่ <b>RIR</b> ไก่รหัส RIR-26-... จะได้สีนี้</div>
      <div class="row2">
        <div><label>สี <span class="req">*</span></label><input type="color" id="bColor" value="#a23b3b" style="width:100%"></div>
        <div><label>ไอคอน</label><input type="text" id="bEmoji" value="🐔" style="width:80px;text-align:center"></div>
      </div>
      <div class="emojis" id="emojiPick"></div>
      <button class="btn" id="bSave">💾 บันทึกสายพันธุ์</button>
      <button class="btn ghost" id="bClear" style="display:none">ยกเลิกการแก้ไข (เพิ่มใหม่แทน)</button>
    </div>

    <div class="card">
      <h2>📋 สายพันธุ์ทั้งหมด</h2>
      <div id="emptyNote"></div>
      <div class="blist" id="blist"></div>
    </div>

  </div>
</div>
<div id="toast"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbyb2xigoUDKr8C9hZArX2kNIHD68OtPuVlOrJsehpgiRVCbw-lFrDS_k08vJu1CCViOdQ/exec";
let DATA=null, editingName=null;
const EMOJIS=['🐔','🐓','🐥','🐤','🥚','⭐','🔴','🟡','🟢','🔵','🟤','⚫'];

function jsonp(params){
  return new Promise((res,rej)=>{
    const cb='__b'+Date.now()+Math.floor(Math.random()*1e5);
    const s=document.createElement('script');
    const clean=()=>{ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode)s.parentNode.removeChild(s); };
    const t=setTimeout(()=>{clean();rej(new Error('หมดเวลาเชื่อมต่อ'));},25000);
    window[cb]=d=>{clearTimeout(t);clean();res(d);};
    s.onerror=()=>{clearTimeout(t);clean();rej(new Error('เชื่อมต่อไม่สำเร็จ'));};
    const q=Object.keys(params).map(k=>k+'='+encodeURIComponent(params[k])).join('&');
    s.src=API+'?'+q+'&callback='+cb+'&_='+Date.now();
    document.body.appendChild(s);
  });
}
function getKey(){ let k=localStorage.getItem('sf_key'); if(!k){ k=prompt('🔒 ใส่รหัสผ่าน (สอบถามผู้ดูแลระบบ)')||''; if(k) localStorage.setItem('sf_key',k);} return k; }
async function writeAction(p){ p.key=getKey(); const r=await jsonp(p); if(r&&r.needKey){ localStorage.removeItem('sf_key'); throw new Error('รหัสไม่ถูกต้อง — กดใหม่แล้วใส่รหัส'); } return r; }
function toast(m,t){ const el=document.getElementById('toast'); el.textContent=m; el.className='show'+(t?' '+t:''); clearTimeout(el._h); el._h=setTimeout(()=>el.classList.remove('show'),3200); }
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function boot(){
  document.getElementById('boot').style.display='block';
  document.getElementById('boot').textContent='⏳ กำลังโหลด…';
  jsonp({key:getKey()}).then(d=>{
    if(d&&d.needKey){ localStorage.removeItem('sf_key'); document.getElementById('boot').innerHTML='🔒 รหัสไม่ถูกต้อง · <a href="#" onclick="boot();return false">ลองใหม่</a>'; return; }
    DATA=d; render();
    document.getElementById('boot').style.display='none';
    document.getElementById('app').style.display='block';
  }).catch(e=>{ document.getElementById('boot').innerHTML='❌ '+e.message+' · <a href="#" onclick="boot();return false">ลองใหม่</a>'; });
}

// รายการพันธุ์: ใช้จากชีท (DATA.BREEDS) ถ้ามี · ไม่งั้นโชว์ค่าเริ่มต้นจาก breeds.js
function currentBreeds(){
  const fromSheet=(DATA&&DATA.BREEDS)||[];
  if(fromSheet.length) return {rows:fromSheet, fromSheet:true};
  // default จาก breeds.js (ยังไม่ถูกบันทึกลงชีท)
  const def=(window.BREEDS_DEFAULT||[]).map(b=>({key:'(ค่าเริ่มต้น)', name:b.name, color:b.color, emoji:b.emoji, _def:true}));
  return {rows:def, fromSheet:false};
}
function render(){
  const {rows,fromSheet}=currentBreeds();
  document.getElementById('emptyNote').innerHTML = fromSheet ? ''
    : '<div class="note">ยังเป็น <b>ค่าเริ่มต้น 8 พันธุ์</b> (ยังไม่ได้บันทึกลงระบบ) — พอเพิ่ม/แก้พันธุ์แรก ระบบจะดึง 8 พันธุ์นี้เข้าชีทให้แก้ได้อัตโนมัติ</div>';
  document.getElementById('blist').innerHTML = rows.map(b=>{
    const canEdit=!b._def;
    return `<div class="brow">
      <span class="sw" style="background:${esc(b.color||'#9a9486')}">${esc(b.emoji||'🐔')}</span>
      <div class="binfo"><div class="bn">${esc(b.name)}</div><div class="bk">รหัส: ${esc(b.key||'—')} · ${esc(b.color||'')}</div></div>
      <div class="bact">${canEdit?`<button class="edit" data-name="${esc(b.name)}" title="แก้">✏️</button><button class="del" data-name="${esc(b.name)}" title="ลบ">🗑</button>`:''}</div>
    </div>`;
  }).join('');
}

// emoji picker
document.getElementById('emojiPick').innerHTML=EMOJIS.map(e=>`<button type="button" data-e="${e}">${e}</button>`).join('');
document.getElementById('emojiPick').addEventListener('click',ev=>{ const b=ev.target.closest('button'); if(!b)return; document.getElementById('bEmoji').value=b.dataset.e; });

// เพิ่ม/แก้
document.getElementById('bSave').onclick=async()=>{
  const name=document.getElementById('bName').value.trim();
  const kw=document.getElementById('bKw').value.trim();
  const color=document.getElementById('bColor').value;
  const emoji=document.getElementById('bEmoji').value.trim()||'🐔';
  if(!name||!kw){ toast('กรอกชื่อ + รหัสนำหน้าก่อน','err'); return; }
  const btn=document.getElementById('bSave'); btn.disabled=true; btn.textContent='⏳ กำลังบันทึก…';
  try{
    const r=await writeAction({action:'addBreed', kw, name, color, emoji});
    if(!r||!r.ok) throw new Error((r&&r.error)||'บันทึกไม่สำเร็จ');
    toast('✅ บันทึก '+name,'ok');
    clearForm(); DATA=await jsonp({key:getKey()}); render();
  }catch(e){ toast('❌ '+e.message,'err'); }
  finally{ btn.disabled=false; btn.textContent='💾 บันทึกสายพันธุ์'; }
};
function clearForm(){
  editingName=null;
  document.getElementById('bName').value=''; document.getElementById('bKw').value='';
  document.getElementById('bColor').value='#a23b3b'; document.getElementById('bEmoji').value='🐔';
  document.getElementById('formTitle').textContent='➕ เพิ่มสายพันธุ์';
  document.getElementById('bClear').style.display='none';
}
document.getElementById('bClear').onclick=clearForm;

// แก้ / ลบ
document.getElementById('blist').addEventListener('click',async e=>{
  const ed=e.target.closest('.edit'), dl=e.target.closest('.del');
  const rows=currentBreeds().rows;
  if(ed){
    const b=rows.find(x=>x.name===ed.dataset.name); if(!b)return;
    document.getElementById('bName').value=b.name;
    document.getElementById('bKw').value=(b.key&&b.key!=='(ค่าเริ่มต้น)')?b.key:'';
    document.getElementById('bColor').value=/^#/.test(b.color||'')?b.color:'#a23b3b';
    document.getElementById('bEmoji').value=b.emoji||'🐔';
    editingName=b.name;
    document.getElementById('formTitle').textContent='✏️ แก้สายพันธุ์: '+b.name;
    document.getElementById('bClear').style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  if(dl){
    const name=dl.dataset.name;
    if(!confirm('ลบสายพันธุ์ "'+name+'" ?')) return;
    try{
      const r=await writeAction({action:'deleteBreed', name});
      if(!r||!r.ok) throw new Error((r&&r.error)||'ลบไม่สำเร็จ');
      toast('🗑 ลบ '+name,'ok');
      DATA=await jsonp({key:getKey()}); render();
    }catch(err){ toast('❌ '+err.message,'err'); }
  }
});

boot();
</script>
</body>
</html>
